<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医疗数据治理平台 — 视觉重设计</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --sw:228px;--sw-c:64px;--th:56px;
      --s-bg1:#1a2d4a;--s-bg2:#0f1825;
      --s-hover:rgba(255,255,255,.05);
      --s-active-bg:rgba(59,130,246,.13);--s-active-bar:#3b82f6;
      --s-text:rgba(255,255,255,.5);--s-text-h:rgba(255,255,255,.88);--s-text-a:#fff;
      --s-div:rgba(255,255,255,.08);
      --t-bg:#fff;--t-border:#eaecf0;
      --bg:#f0f3f7;--card:#fff;--card-b:#e2e8f0;
      --card-sh:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.06);
      --card-sh-h:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
      --accent:#2563eb;--accent-d:#1d4ed8;--accent-l:#eff6ff;
      --tx1:#0f172a;--tx2:#64748b;--tx3:#94a3b8;
      --ok:#059669;--ok-bg:#f0fdf4;--ok-b:#d1fae5;
      --warn:#d97706;--warn-bg:#fffbeb;--warn-b:#fde68a;
      --err:#dc2626;--err-bg:#fef2f2;--err-b:#fecaca;
      --r:8px;--font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font);font-size:14px;color:var(--tx1);background:var(--bg);-webkit-font-smoothing:antialiased}
    #root{display:flex;height:100vh;overflow:hidden}
    /* sidebar */
    .sidebar{width:var(--sw);min-width:var(--sw);background:linear-gradient(180deg,var(--s-bg1) 0%,var(--s-bg2) 100%);display:flex;flex-direction:column;transition:width .2s,min-width .2s;overflow:hidden;z-index:10;flex-shrink:0;box-shadow:2px 0 12px rgba(0,0,0,.15)}
    .sidebar.col{width:var(--sw-c);min-width:var(--sw-c)}
    .s-logo{height:var(--th);padding:0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--s-div);flex-shrink:0}
    .s-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0;box-shadow:0 2px 8px rgba(59,130,246,.4)}
    .s-logo-text{color:#fff;font-weight:700;font-size:14px;white-space:nowrap;letter-spacing:-.2px}
    .s-logo-sub{color:rgba(255,255,255,.3);font-size:10.5px;margin-top:2px;white-space:nowrap;letter-spacing:.2px}
    .s-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden}
    .s-nav::-webkit-scrollbar{display:none}
    .nav-group-lbl{padding:14px 18px 3px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.22);font-weight:600;white-space:nowrap}
    .nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;color:var(--s-text);transition:color .12s,background .12s;position:relative;font-size:13.5px;user-select:none;white-space:nowrap;margin:1px 8px;border-radius:6px}
    .nav-item:hover{color:var(--s-text-h);background:var(--s-hover)}
    .nav-item.act{color:var(--s-text-a);background:var(--s-active-bg)}
    .nav-item.act::before{content:'';position:absolute;left:-8px;top:6px;bottom:6px;width:3px;background:var(--s-active-bar);border-radius:0 2px 2px 0}
    .nav-item i{font-size:16px;flex-shrink:0;width:20px;text-align:center}
    .s-foot{padding:8px 0;border-top:1px solid var(--s-div);flex-shrink:0}
    .s-user{display:flex;align-items:center;gap:10px;padding:10px 18px;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer}
    .s-user:hover{color:rgba(255,255,255,.9)}
    .s-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;box-shadow:0 1px 4px rgba(37,99,235,.4)}
    /* main */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{height:var(--th);background:var(--t-bg);border-bottom:1px solid var(--t-border);box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
    .live-stat{display:flex;align-items:center;gap:6px;padding:4px 12px;background:#f8fafc;border-radius:6px;border:1px solid var(--card-b);cursor:default}
    .live-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .content{flex:1;overflow-y:auto;padding:20px 24px}
    .content::-webkit-scrollbar{width:5px}
    .content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    /* cards */
    .card{background:var(--card);border:1px solid var(--card-b);border-radius:var(--r);box-shadow:var(--card-sh);transition:box-shadow .15s}
    .card:hover{box-shadow:var(--card-sh-h)}
    .card-hd{padding:14px 18px;border-bottom:1px solid var(--card-b);font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
    .card-bd{padding:18px}
    /* kpi — user chose style 2: left border + tinted bg */
    .kpi{border-radius:var(--r);padding:18px 20px 16px 20px;box-shadow:var(--card-sh);position:relative;overflow:hidden;border:1px solid var(--card-b)}
    .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
    .kpi-normal{background:linear-gradient(135deg,#f0fdf4 0%,#fff 55%);border-color:var(--ok-b)}
    .kpi-normal::before{background:var(--ok)}
    .kpi-error{background:linear-gradient(135deg,#fff1f2 0%,#fff 55%);border-color:var(--err-b)}
    .kpi-error::before{background:var(--err)}
    .kpi-warning{background:linear-gradient(135deg,#fffbeb 0%,#fff 55%);border-color:var(--warn-b)}
    .kpi-warning::before{background:var(--warn)}
    .kpi-neutral{background:#fff;border-color:var(--card-b)}
    .kpi-neutral::before{background:#94a3b8}
    .kpi-lbl{font-size:11.5px;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;letter-spacing:.1px}
    .kpi-val{font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
    .kpi-foot{margin-top:10px;font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:5px}
    /* grids */
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .g2{display:grid;grid-template-columns:3fr 2fr;gap:16px}
    .g2e{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    /* table */
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl thead{background:#f8fafc}
    .tbl th{padding:9px 14px;text-align:left;font-weight:600;color:var(--tx2);font-size:11.5px;border-bottom:2px solid var(--card-b);letter-spacing:.2px;text-transform:uppercase}
    .tbl td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tbody tr:hover td{background:#f5f8ff}
    /* tags */
    .tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;letter-spacing:.1px}
    .tag-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-b)}
    .tag-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-b)}
    .tag-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-b)}
    .tag-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-purple{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
    .tag-gray{background:#f1f5f9;color:var(--tx2);border:1px solid #e2e8f0}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-ok{background:var(--ok)}.dot-warn{background:var(--warn)}.dot-err{background:var(--err)}
    /* tabs */
    .tabs{display:flex;border-bottom:1px solid var(--card-b);margin-bottom:16px}
    .tab{padding:10px 16px;font-size:13.5px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:color .12s;margin-bottom:-1px;user-select:none}
    .tab:hover{color:var(--tx1)}.tab.act{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
    /* buttons */
    .btn{padding:6px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;transition:all .12s;font-family:var(--font);line-height:1.5;display:inline-flex;align-items:center;gap:5px}
    .btn-primary{background:var(--accent);color:#fff;border:none}.btn-primary:hover{background:#1d4ed8}.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
    .btn-default{background:#fff;color:var(--tx1);border:1px solid var(--card-b)}.btn-default:hover{background:#f8fafc}
    .btn-danger{background:#fff;color:var(--err);border:1px solid #fca5a5}.btn-danger:hover{background:var(--err-bg)}
    .btn-sm{padding:3px 10px;font-size:12px}
    /* form */
    .filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .sel{padding:6px 10px;border:1px solid var(--card-b);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;color:var(--tx1);background:#fff;cursor:pointer}
    .sel:focus{border-color:var(--accent)}
    .fi{padding:7px 10px;border:1px solid var(--card-b);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;width:100%}
    .fi:focus{border-color:var(--accent)}
    textarea.fi{resize:vertical;line-height:1.6}
    .fl{font-size:12px;color:var(--tx2);margin-bottom:4px}
    /* code */
    .code-block{background:#0f172a;color:#e2e8f0;border-radius:var(--r);padding:12px 14px;font-size:12px;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;line-height:1.7;overflow-x:auto}
    /* lineage */
    .l-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
    .l-node{padding:3px 10px;border-radius:20px;font-size:12px;background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe}
    .l-arr{color:var(--tx3);font-size:13px}
    /* sensitivity */
    .tag-rest{background:var(--err-bg);color:var(--err)}.tag-int{background:var(--warn-bg);color:var(--warn)}.tag-pub{background:var(--ok-bg);color:var(--ok)}
    /* placeholder */
    .ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:380px;color:var(--tx3);gap:12px}
    .ph i{font-size:48px}
    /* chat */
    .chat-fab{position:fixed;right:24px;bottom:24px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:21px;cursor:pointer;z-index:100;box-shadow:0 4px 14px rgba(37,99,235,.45);transition:transform .15s,box-shadow .15s}
    .chat-fab:hover{transform:scale(1.07)}
    .chat-panel{position:fixed;right:0;top:0;bottom:0;width:400px;background:#fff;border-left:1px solid var(--card-b);box-shadow:-4px 0 24px rgba(0,0,0,.09);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
    .chat-panel.open{transform:translateX(0)}
    .chat-hd{height:52px;background:var(--s-bg1);color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
    .chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
    .msg-row{display:flex;flex-direction:column}
    .msg-row.user{align-items:flex-end}.msg-row.bot{align-items:flex-start}
    .msg-bubble{padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-width:88%}
    .msg-row.user .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 12px 3px 12px}
    .msg-row.bot .msg-bubble{background:#f1f5f9;color:var(--tx1);border-radius:12px 12px 12px 3px}
    .sql-block{background:#0f172a;color:#e2e8f0;border-radius:6px;padding:10px 12px;font-size:11.5px;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;margin-top:6px;line-height:1.7}
    .sql-btn{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px 0 0;font-family:var(--font)}
    .chip{display:inline-block;padding:6px 12px;border-radius:20px;background:#f1f5f9;color:var(--tx2);font-size:12.5px;cursor:pointer;border:1px solid var(--card-b);transition:all .12s;text-align:left;width:100%}
    .chip:hover{background:var(--accent-l);color:var(--accent);border-color:#bfdbfe}
    .chat-inp-row{padding:12px;border-top:1px solid var(--card-b);display:flex;gap:8px;flex-shrink:0}
    .chat-inp-row input{flex:1;padding:8px 12px;border:1px solid var(--card-b);border-radius:6px;font-size:13.5px;font-family:var(--font);outline:none;transition:border-color .15s}
    .chat-inp-row input:focus{border-color:var(--accent)}
    .chat-inp-row button{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px}
    .chat-inp-row button:disabled{background:#cbd5e1;cursor:not-allowed}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .dot-anim{display:inline-flex;gap:4px;align-items:center;padding:2px 0}
    .dot-anim span{width:6px;height:6px;border-radius:50%;background:var(--tx3);display:inline-block}
    .dot-anim span:nth-child(1){animation:blink 1.2s 0s infinite}
    .dot-anim span:nth-child(2){animation:blink 1.2s .2s infinite}
    .dot-anim span:nth-child(3){animation:blink 1.2s .4s infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .spin-dark{border-color:rgba(37,99,235,.2);border-top-color:var(--accent)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<!-- ── 共用组件 ──────────────────────────────────── -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ECharts 专业调色板
if (window.echarts) {
  window.echarts.registerTheme('med', {
    color: ['#2563eb','#0891b2','#7c3aed','#059669','#d97706','#dc2626','#f59e0b','#10b981'],
    backgroundColor: 'transparent',
    categoryAxis: { axisLine: { lineStyle: { color: '#e2e8f0' } }, axisTick: { show: false }, axisLabel: { color: '#94a3b8', fontSize: 11 } },
    valueAxis: { splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } }, axisLabel: { color: '#94a3b8', fontSize: 11 } },
  });
}

function KpiCard({ title, value, unit, status='normal', precision, sub, icon }) {
  const displayed = precision != null ? Number(value).toFixed(precision) : value;
  const statusIcon = { normal:'ri-arrow-up-line', error:'ri-alert-fill', warning:'ri-alarm-warning-line', neutral:null };
  const statusColor = { normal:'var(--ok)', error:'var(--err)', warning:'var(--warn)', neutral:'var(--tx2)' };
  const si = statusIcon[status]; const sc = statusColor[status];
  return (
    <div className={`kpi kpi-${status}`}>
      <div className="kpi-lbl">
        <span>{title}</span>
        {(icon || si) && <i className={icon || si} style={{fontSize:14,color:sc,opacity:.7}}/>}
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:5,margin:'4px 0 0'}}>
        <div className="kpi-val" style={{color:sc}}>{displayed}</div>
        {unit && <span style={{fontSize:13,color:'var(--tx2)',fontWeight:500}}>{unit}</span>}
      </div>
      {sub && <div className="kpi-foot"><span>{sub}</span></div>}
    </div>
  );
}

function EChart({ option, height=260 }) {
  const dr=useRef(null), cr=useRef(null), os=JSON.stringify(option);
  useEffect(()=>{
    if(!dr.current||!window.echarts)return;
    cr.current=window.echarts.init(dr.current,'med');
    cr.current.setOption(option);
    const ro=new ResizeObserver(()=>cr.current&&cr.current.resize());
    ro.observe(dr.current);
    return()=>{ro.disconnect();cr.current&&cr.current.dispose();};
  },[]);
  useEffect(()=>{cr.current&&cr.current.setOption(JSON.parse(os),{notMerge:true});},[os]);
  return <div ref={dr} style={{height,width:'100%'}}/>;
}

const NAV_GROUPS = [
  { label:'数据监控', items:[
    {key:'dashboard',icon:'ri-dashboard-2-line',    label:'首页'},
    {key:'dq',       icon:'ri-shield-check-line',   label:'数据质量'},
    {key:'mpi',      icon:'ri-group-line',           label:'患者主数据'},
  ]},
  { label:'临床分析', items:[
    {key:'drug',     icon:'ri-medicine-bottle-line', label:'药物监测'},
    {key:'expense',  icon:'ri-bar-chart-2-line',     label:'费用分析'},
    {key:'inpatient',icon:'ri-hospital-line',        label:'住院质量'},
  ]},
  { label:'数据管理', items:[
    {key:'dev',      icon:'ri-robot-line',           label:'AI 指标开发'},
    {key:'semantic', icon:'ri-database-2-line',      label:'语义层'},
  ]},
];
const NAV = NAV_GROUPS.flatMap(g => g.items);

function LogoMark() {
  return (
    <div className="s-logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5L2 4.5v5c0 4 3 7.5 7 8.5 4-1 7-4.5 7-8.5v-5L9 1.5z" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.5)" strokeWidth="1"/>
        <polyline points="3.5,9 5.5,9 6.5,6.5 8.5,11.5 10.5,6.5 12,9 13,8 14.5,8" fill="none" stroke="white" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

function Sidebar({active,onNav,col,onToggle}){
  return(
    <aside className={`sidebar${col?' col':''}`}>
      <div className="s-logo">
        <LogoMark/>
        {!col&&<div><div className="s-logo-text">医疗数据治理</div><div className="s-logo-sub">Clinical Data Platform</div></div>}
      </div>
      <nav className="s-nav">
        {NAV_GROUPS.map(group=>(
          <div key={group.label}>
            {!col&&<div className="nav-group-lbl">{group.label}</div>}
            {group.items.map(n=>(
              <div key={n.key} className={`nav-item${active===n.key?' act':''}`}
                onClick={()=>onNav(n.key)} title={col?n.label:''}>
                <i className={n.icon}/>{!col&&<span>{n.label}</span>}
              </div>
            ))}
          </div>
        ))}
      </nav>
      <div className="s-foot">
        {!col&&<div className="s-user"><div className="s-avatar">管</div><div><div style={{fontSize:13,color:'rgba(255,255,255,.8)',fontWeight:500}}>管理员</div><div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginTop:1}}>Administrator</div></div></div>}
        <div className="nav-item" onClick={onToggle} style={{marginTop:4}} title={col?'展开':'收起'}>
          <i className={col?'ri-layout-right-2-line':'ri-layout-left-2-line'}/>{!col&&<span style={{fontSize:12.5}}>收起侧栏</span>}
        </div>
      </div>
    </aside>
  );
}

function Topbar({title, page}){
  return(
    <header className="topbar">
      <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
        <span style={{fontSize:12,color:'var(--tx3)'}}>医疗数据治理</span>
        <i className="ri-arrow-right-s-line" style={{color:'var(--tx3)',fontSize:14}}/>
        <span style={{fontWeight:600,fontSize:15,color:'var(--tx1)'}}>{title}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div className="live-stat">
          <span className="live-dot" style={{background:'var(--ok)'}}/>

function SensTag({v}){
  if(v==='restricted')return<span className="tag tag-rest">restricted</span>;
  if(v==='internal')return<span className="tag tag-int">internal</span>;

function useApiData(url,fallback){
  const [data,setData]=React.useState(null);
  const [err,setErr]=React.useState(false);
  React.useEffect(()=>{
    fetch(url).then(r=>r.json()).then(d=>setData(d.items||d)).catch(()=>setErr(true));
  },[url]);
  return err||data===null?fallback:(Array.isArray(data)?data:fallback);
}

function SemanticLayerPage(){
  const [tab,setTab]=React.useState('query');
  const [loading,setLoading]=React.useState(false);
  const [sqlResult,setSqlResult]=React.useState(null);
  const [queryResult,setQueryResult]=React.useState(null);
  const [queryErr,setQueryErr]=React.useState('');
  const [approvals,setApprovals]=React.useState(null);
  const [auditEvents,setAuditEvents]=React.useState(null);

  const tenantRef=React.useRef();const roleRef=React.useRef();const metricsRef=React.useRef();
  const dimsRef=React.useRef();const limitRef=React.useRef();

  const metrics=useApiData('/api/v1/semantic/metrics',SEM_METRICS.map(m=>({name:m.name,display_name:m.display,dataset:m.dataset,formula:m.formula,status:m.status,owner:m.owner})));
  const dimensions=useApiData('/api/v1/semantic/dimensions',SEM_DIMS.map(d=>({name:d.name,display_name:d.display,dataset:d.dataset,column:d.col,type:d.type,sensitivity:d.sens})));
  const datasets=useApiData('/api/v1/semantic/datasets',SEM_DATASETS.map(d=>({name:d.name,display_name:d.display,physical_table:d.table,time_field:d.time_field,field_count:d.fields})));

  React.useEffect(()=>{
    if(tab==='approvals'&&approvals===null){
      fetch('/api/v1/semantic/governance/metric-status-requests').then(r=>r.json())
        .then(d=>setApprovals(d.items||SEM_APPROVALS)).catch(()=>setApprovals(SEM_APPROVALS));
    }
    if(tab==='audit'&&auditEvents===null){
      fetch('/api/v1/semantic/audit/events').then(r=>r.json())
        .then(d=>setAuditEvents(d.items||SEM_AUDIT)).catch(()=>setAuditEvents(SEM_AUDIT));
    }
  },[tab]);

  const buildReq=()=>({
    tenant_id:(tenantRef.current?.value||'hospital-a').trim(),
    role:(roleRef.current?.value||'analyst').trim(),
    metrics:(metricsRef.current?.value||'ddi_intensity').split(/[,\s]+/).map(s=>s.trim()).filter(Boolean),
    dimensions:(dimsRef.current?.value||'stat_date').split(/[,\s]+/).map(s=>s.trim()).filter(Boolean),
    filters:[],
    limit:parseInt(limitRef.current?.value||'100',10)||100,
  });

  const doCompile=async()=>{
    setLoading(true);setSqlResult(null);setQueryResult(null);setQueryErr('');
    try{
      const res=await fetch('/api/v1/semantic/compile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildReq())});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||'HTTP '+res.status);}
      const d=await res.json();setSqlResult(d.sql||JSON.stringify(d,null,2));
    }catch(e){setSqlResult('-- 编译失败: '+e.message);}
    finally{setLoading(false);}
  };

  const doQuery=async()=>{
    setLoading(true);setQueryResult(null);setQueryErr('');
    try{
      const res=await fetch('/api/v1/semantic/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildReq())});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||'HTTP '+res.status);}
      const d=await res.json();
      if(d.sql&&!sqlResult)setSqlResult(d.sql);
      const rows=d.rows||d.data||[];
      const cols=d.columns||(rows.length?Object.keys(rows[0]):[]);
      setQueryResult({columns:cols,rows});
    }catch(e){setQueryErr(e.message);}
    finally{setLoading(false);}
  };

  const approve=async(id)=>{
    try{await fetch(`/api/v1/semantic/governance/metric-status-requests/${id}/approve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewer:'admin',comment:'通过审批'})});}catch{}
    setApprovals(p=>(p||[]).map(r=>r.id===id||r.request_id===id?{...r,status:'approved',reviewer:'admin'}:r));
  };
  const reject=async(id)=>{
    try{await fetch(`/api/v1/semantic/governance/metric-status-requests/${id}/reject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewer:'admin',comment:'驳回'})});}catch{}
    setApprovals(p=>(p||[]).map(r=>r.id===id||r.request_id===id?{...r,status:'rejected',reviewer:'admin'}:r));
  };

  const effApprovals=approvals||SEM_APPROVALS;
  const effAudit=auditEvents||SEM_AUDIT;

  return(
    <>
      <div style={{fontSize:13,color:'var(--tx2)',marginBottom:16}}>统一指标口径，通过受控 DSL 编译 SQL，执行租户、角色和敏感字段策略校验。</div>
      <div className="tabs">
        {[['query','语义查询'],['metrics','指标目录'],['dimensions','维度目录'],['datasets','数据集'],['approvals','审批流'],['audit','审计事件']].map(([k,l])=>(
          <div key={k} className={`tab${tab===k?' act':''}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      {tab==='query'&&(
        <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:16,alignItems:'start'}}>
          <Crd3 title="查询 DSL">
            {[['租户',tenantRef,'hospital-a'],['角色',roleRef,'analyst'],['指标（逗号分隔）',metricsRef,'ddi_intensity'],['维度（逗号分隔）',dimsRef,'stat_date, dept_name'],['行数限制',limitRef,'100']].map(([l,r,v])=>(
              <div key={l} style={{marginBottom:10}}>
                <div className="fl">{l}</div>
                <input className="fi" ref={r} defaultValue={v}/>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button className="btn btn-default" style={{flex:1,justifyContent:'center'}} onClick={doCompile} disabled={loading}>{loading?<span className="spin-dark" style={{width:12,height:12,border:'2px solid #e2e8f0',borderTopColor:'var(--tx2)',borderRadius:'50%',display:'inline-block'}}/>:<i className="ri-code-s-slash-line"/>} 编译 SQL</button>
              <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={doQuery} disabled={loading}>{loading?<span className="spin"/>:<i className="ri-play-circle-line"/>} 执行查询</button>
            </div>
          </Crd3>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Crd3 title="SQL 预览">
              {sqlResult?<div className="code-block">{sqlResult}</div>:<div style={{fontSize:13,color:'var(--tx3)',padding:'8px 0'}}>点击"编译 SQL"后在此显示</div>}
            </Crd3>
            <Crd3 title="查询结果">
              {queryErr&&<div style={{color:'var(--err)',fontSize:13,padding:'8px 0'}}>{queryErr}</div>}
              {queryResult&&queryResult.rows.length>0?(
                <table className="tbl"><thead><tr>{queryResult.columns.map(c=><th key={c}>{c}</th>)}</tr></thead>
                <tbody>{queryResult.rows.map((r,i)=><tr key={i}>{queryResult.columns.map(c=><td key={c} style={{fontFamily:typeof r[c]==='number'?'monospace':'inherit'}}>{String(r[c]??'')}</td>)}</tr>)}</tbody></table>

            </Crd3>
          </div>
        </div>
      )}

      {tab==='metrics'&&(

                <td style={{fontSize:12,color:'var(--tx2)'}}>{r.reason}</td>
                <td><span className={`tag ${status==='pending'?'tag-warn':status==='approved'?'tag-ok':'tag-err'}`}>{status}</span></td>
                <td>{status==='pending'?<div style={{display:'flex',gap:6}}><button className="btn btn-primary btn-sm" onClick={()=>approve(id)}>通过</button><button className="btn btn-danger btn-sm" onClick={()=>reject(id)}>驳回</button></div>:<span style={{fontSize:12,color:'var(--tx3)'}}>已处理</span>}</td>
              </tr>
            );
          })}</tbody></table>
        </Crd3>
      )}

      {tab==='audit'&&(
        <Crd3 title="审计事件">
          <table className="tbl"><thead><tr><th>事件类型</th><th>租户</th><th>角色</th><th>状态</th><th>说明</th><th>时间</th></tr></thead>
          <tbody>{effAudit.map((e,i)=>{
            const evType=e.type||e.event_type;
            const tenant=e.tenant||e.tenant_id;
            const role=e.role;
            const status=e.status||e.result;
            const msg=e.msg||e.message||e.detail;
            const ts=e.ts||e.created_at;
            const timeStr=ts?(typeof ts==='number'?new Date(ts*1000).toLocaleString():new Date(ts).toLocaleString()):'—';
            return(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:12,fontWeight:500}}>{evType}</td>
                <td style={{fontSize:12,color:'var(--tx2)'}}>{tenant}</td>
                <td style={{fontSize:12,color:'var(--tx2)'}}>{role}</td>
                <td><span className={`tag ${status==='allowed'||status==='success'?'tag-ok':'tag-err'}`}>{status}</span></td>
                <td style={{fontSize:12,color:'var(--tx2)',maxWidth:280}}>{msg}</td>
                <td style={{fontSize:12,color:'var(--tx3)',whiteSpace:'nowrap'}}>{timeStr}</td>
              </tr>
            );
          })}</tbody></table>
        </Crd3>
      )}
    </>
  );
}

window.__p3={DevAssistantPage,SemanticLayerPage};
</script>

<!-- ── AI Chat ─────────────────────────────────── -->
<script type="text/babel">
const DEFAULT_SUGS=['今日有哪些 CRITICAL 级别的 DQ 告警？','上个月抗肿瘤药物使用强度趋势如何？','疑似重复患者主要来自哪些系统？','近 30 天 DQ 评分最低的是哪天？'];
const CHAT_SESSION_ID='sess-'+Math.random().toString(36).slice(2,10);

function AiChat(){
  const [open,setOpen]=React.useState(false);
  const [msgs,setMsgs]=React.useState([]);
  const [input,setInput]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [sqlOpen,setSqlOpen]=React.useState({});
  const [dataOpen,setDataOpen]=React.useState({});
  const [sugs,setSugs]=React.useState(DEFAULT_SUGS);
  const ref=React.useRef(null);

  React.useEffect(()=>{
    fetch('/api/chat/suggestions?count=4').then(r=>r.json()).then(d=>{
      if(d.suggestions&&d.suggestions.length)setSugs(d.suggestions);
    }).catch(()=>{});
  },[]);

  React.useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs,loading]);

  const send=async(text)=>{
    const msg=(text||input).trim();if(!msg||loading)return;
    setInput('');setMsgs(p=>[...p,{role:'user',content:msg}]);setLoading(true);
    try{
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:CHAT_SESSION_ID,message:msg,user_id:'frontend'})});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const d=await res.json();
      setMsgs(p=>[...p,{role:'bot',content:d.answer||'（无回答）',sql:d.sql||'',data:d.data||[],row_count:d.row_count||0}]);
    }catch(e){setMsgs(p=>[...p,{role:'bot',content:'服务暂时不可用，请稍后重试。（'+e.message+')'}]);}
    finally{setLoading(false);}
  };

  return(
    <>
      {!open&&<div className="chat-fab" onClick={()=>setOpen(true)} title="AI 数据助手"><i className="ri-robot-2-line"/></div>}
      <div className={`chat-panel${open?' open':''}`}>
        <div className="chat-hd">
          <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}><i className="ri-robot-2-line"/></div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>AI 数据助手</div><div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginTop:1}}>自然语言查询医疗数据</div></div>
          <i className="ri-close-line" style={{cursor:'pointer',fontSize:20,color:'rgba(255,255,255,.5)',padding:4}} onClick={()=>setOpen(false)}/>
        </div>
        <div className="chat-msgs" ref={ref}>
          {msgs.length===0&&(
            <div style={{paddingTop:24,display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{width:56,height:56,borderRadius:'50%',background:'var(--accent-l)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}><i className="ri-robot-2-line" style={{fontSize:26,color:'var(--accent)'}}/></div>
              <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>你好，我是数据助手</div>
              <div style={{fontSize:12,color:'var(--tx3)',marginBottom:20}}>可以用自然语言向我提问</div>
              <div style={{width:'100%',display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:12,color:'var(--tx3)',marginBottom:2}}>推荐问题：</div>
                {sugs.map((s,i)=><div key={i} className="chip" onClick={()=>send(s)}>{s}</div>)}
              </div>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className={`msg-row ${m.role}`}>
              <div className="msg-bubble">{m.content}</div>
              {m.role==='bot'&&m.sql&&(
                <div style={{marginTop:4,maxWidth:'90%'}}>
                  <button className="sql-btn" onClick={()=>setSqlOpen(p=>({...p,[i]:!p[i]}))}>
                    <i className="ri-code-s-slash-line" style={{marginRight:4}}/>{sqlOpen[i]?'隐藏 SQL':'查看 SQL'}
                  </button>
                  {sqlOpen[i]&&<div className="sql-block">{m.sql}</div>}
                </div>
              )}
              {m.role==='bot'&&m.data&&m.data.length>0&&(
                <div style={{marginTop:4,maxWidth:'94%'}}>
                  <button className="sql-btn" onClick={()=>setDataOpen(p=>({...p,[i]:!p[i]}))}>
                    <i className="ri-table-line" style={{marginRight:4}}/>{dataOpen[i]?'收起数据':'查看数据'} ({m.row_count} 行)
                  </button>
                  {dataOpen[i]&&(
                    <div style={{overflowX:'auto',marginTop:6,borderRadius:6,border:'1px solid var(--card-b)'}}>
                      <table className="tbl" style={{fontSize:11.5}}>
                        <thead><tr>{Object.keys(m.data[0]).map(c=><th key={c}>{c}</th>)}</tr></thead>
                        <tbody>{m.data.slice(0,10).map((r,ri)=><tr key={ri}>{Object.values(r).map((v,vi)=><td key={vi}>{String(v)}</td>)}</tr>)}</tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
          {loading&&<div className="msg-row bot"><div className="msg-bubble"><div className="dot-anim"><span/><span/><span/></div></div></div>}
        </div>
        <div className="chat-inp-row">
          <input placeholder="输入你的数据问题..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} disabled={loading}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()}><i className="ri-send-plane-fill"/></button>
        </div>
      </div>
    </>
  );
}
window.__AiChat=AiChat;
</script>

<!-- ── App ────────────────────────────────────── -->
<script type="text/babel">
const {Sidebar:SB,Topbar:TB,Placeholder:PLH}=window.__sc;
const {DashboardPage:DP,DQPage:DQP,DrugPage:DrugP}=window.__p1;
const {MPIPage:MPIP,ExpensePage:ExpP,InpatientPage:InpP}=window.__p2;
const {DevAssistantPage:DevP,SemanticLayerPage:SemP}=window.__p3;
const AC=window.__AiChat;

const TITLES={dashboard:'首页',dq:'数据质量',mpi:'患者主数据',drug:'药物监测',expense:'费用分析',inpatient:'住院质量',dev:'AI 指标开发',semantic:'语义层'};

function App(){
  const [page,setPage]=React.useState('dashboard');
  const [col,setCol]=React.useState(false);
  const render=()=>{
    if(page==='dashboard')return<DP/>;if(page==='dq')return<DQP/>;if(page==='mpi')return<MPIP/>;
    if(page==='drug')return<DrugP/>;if(page==='expense')return<ExpP/>;if(page==='inpatient')return<InpP/>;
    if(page==='dev')return<DevP/>;if(page==='semantic')return<SemP/>;return<PLH page={TITLES[page]}/>;
  };
  return(
    <>
      <SB active={page} onNav={setPage} col={col} onToggle={()=>setCol(c=>!c)}/>
      <div className="main"><TB title={TITLES[page]}/><main className="content">{render()}</main></div>
      <AC/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
