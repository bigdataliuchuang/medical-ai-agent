questions:
  # ── 抗肿瘤药物 ──────────────────────────────────────────────────────────────
  - id: q001
    domain: drug
    difficulty: easy
    question: 统计本月各科室抗肿瘤药物使用金额。
    expected_tables: [dws.dws_tumor_drug_usage_1d, dim.dim_dept_dict]
    expected_metrics: [antitumor_drug_amount]
    expected_fields: [dept_code, dept_name, stat_month]

  - id: q002
    domain: tumor
    difficulty: easy
    question: 统计最近一个月肺癌患者住院人次。
    expected_tables: [dwd.dwd_visit, dwd.dwd_diagnosis]
    expected_metrics: [inpatient_visit_count]
    expected_fields: [diagnosis_code, visit_type, visit_date]

  - id: q003
    domain: drug
    difficulty: medium
    question: 查询本月抗肿瘤药物费用环比增长最高的科室。
    expected_tables: [dws.dws_tumor_drug_usage_1d, dim.dim_dept_dict]
    expected_metrics: [antitumor_drug_amount, department_expense_mom_growth_rate]
    expected_fields: [dept_code, dept_name, stat_month]

  - id: q004
    domain: dq
    difficulty: easy
    question: 本周 DQ 问题最多的表有哪些？
    expected_tables: [ads.ads_dq_result_summary]
    expected_metrics: [dq_issue_count]
    expected_fields: [table_name, severity]

  - id: q005
    domain: mpi
    difficulty: easy
    question: 最近 7 天 MPI 覆盖率趋势如何？
    expected_tables: [dws.dws_mpi_quality_1d]
    expected_metrics: [mpi_coverage_rate]
    expected_fields: [stat_date]

  - id: q006
