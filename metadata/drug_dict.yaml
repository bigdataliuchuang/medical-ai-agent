description: 抗肿瘤及相关药品字典（dim.dim_drug_dict）

table: dim.dim_drug_dict
primary_key: drug_code
fields:
  - name: drug_code
    type: VARCHAR(20)
    comment: 药品编码（院内统一编码）
    sensitive: false
  - name: drug_name
    type: VARCHAR(100)
    comment: 药品通用名
    sensitive: false
  - name: drug_category
    type: VARCHAR(20)
    comment: "药品大类：ANTITUMOR(抗肿瘤) / ANTIBIOTIC(抗菌素) / HORMONE(激素) / OTHER(其他)"
    sensitive: false
  - name: atc_code
    type: VARCHAR(10)
    comment: "WHO ATC分类编码（L01=抗肿瘤药, L02=内分泌治疗, L03=免疫调节剂）"
    sensitive: false
  - name: is_antitumor
    type: TINYINT
    comment: "是否抗肿瘤药物（1=是, 0=否）"
    sensitive: false
  - name: drug_form
    type: VARCHAR(20)
    comment: 剂型（片剂/注射剂/胶囊等）
    sensitive: false
  - name: unit
    type: VARCHAR(10)
    comment: 计量单位（mg/ml/片）
    sensitive: false

