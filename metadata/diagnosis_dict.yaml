    category: MALIGNANT
    icd_version: "2016"

  - icd_code: C22.0
    icd_name: 肝细胞癌
    tumor_type: liver
    category: MALIGNANT
    icd_version: "2016"

  # 淋巴瘤 C81-C85
  - icd_code: C83
    icd_name: 非滤泡性淋巴瘤
    tumor_type: lymphoma
    category: MALIGNANT
    icd_version: "2016"

  - icd_code: C85
    icd_name: 其他和未特指类型的非霍奇金淋巴瘤
    tumor_type: lymphoma
    category: MALIGNANT
